<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            color: white;
            padding: 20px; }
        h1 { text-align: center; }
        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td { padding: 12px; text-align: center; }
        th { background-color: #6c63ff; color: white;}

        tr:nth-child(even) { background-color: #f2f2f2; }

        tr:hover { background-color: #ddd; }
        
        .top-bar { display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .logout-btn {
            background: #ff4b5c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover { background: #ff1e3c; }
    </style>
</head>

<body>

<script>
const isAdmin = localStorage.getItem("isAdmin");

if (!isAdmin || isAdmin !== "true") {
    window.location.replace("login.html");
}
</script>
<div class="top-bar">
    <h1>📊 Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<table id="dataTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Course</th>
            <th>Event</th>
            <th>Comments</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function loadData() {
    const res = await fetch("https://backend-capstone-production-7110.up.railway.app/registrations");
    const data = await res.json();

    const table = document.querySelector("#dataTable tbody");
    table.innerHTML = "";

    data.forEach(user => {
        table.innerHTML += `
            <tr>
                <td>${user.fullname}</td>
                <td>${user.email}</td>
                <td>${user.age}</td>
                <td>${user.course}</td>
                <td>${user.event}</td>
                <td>${user.comments}</td>
            </tr>
        `;
    });
}

function logout() {
    localStorage.removeItem("isAdmin");
    window.location.href = "login.html";
}

loadData();
</script>

</body>
</html>
